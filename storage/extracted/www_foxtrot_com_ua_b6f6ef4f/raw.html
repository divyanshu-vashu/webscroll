<!DOCTYPE html><html lang="uk"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Доступ обмежено</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 0 20px;
    }
    .brand {
      font-size: 2.5em; 
      font-weight: 700;
      color: #f26522; 
      margin-bottom: 0.5em; 
    }
    h1 {
      color: #dc3545; 
      font-size: 2.8em; 
      margin: 0.3em 0 0.5em 0;
    }
    p {
      font-size: 1.4em; 
      color: #555;
      line-height: 1.5;
      max-width: 600px;
      margin: 0.8em auto;
    }
    .contact-info {
      margin-top: 2em;
      padding: 1.5em;
      border: 1px solid #f26522;
      border-radius: 8px;
      background: #fff8f5;
      font-size: 1.2em;
    }
    .contact-info strong {
        color: #f26522;
        display: block;
        margin-top: 0.5em;
    }
    a {
        color: #f26522;
        text-decoration: none;
        font-weight: 700;
    }
    a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>
  
  <h1>🚫 Доступ заборонено</h1>
  
  <p> 
    🛑 Ваш обліковий запис або пристрій не має необхідних прав доступу до цього ресурсу.
  </p>  
  <div class="contact-info">
    <p>
      ⚠️ Щоб отримати доступ, будь ласка, зверніться до розробників або адміністраторів системи.
    </p>
  </div>
  

</body></html>
